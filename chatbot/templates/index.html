<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot SENAI</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 90%;
      max-width: 400px;
      height: 600px;
      background: #4a4a4a;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 15px;
      background-color: #333;
      text-align: center;
      border-bottom: 1px solid #444;
    }

    #chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background-color: #3a3a3a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 15px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .bot-message {
      background-color: #007bff;
      align-self: flex-start;
      border-top-left-radius: 5px;
    }

    .user-message {
      background-color: #333;
      align-self: flex-end;
      border-top-right-radius: 5px;
    }

    .input-area {
      display: flex;
      padding: 15px;
      background: #222;
      border-top: 1px solid #444;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #444;
      border-radius: 25px;
      outline: none;
      font-size: 14px;
      background-color: #333;
      color: white;
    }

    .input-area button {
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }

    .input-area button:hover {
      background-color: #0056b3;
    }

    .reset-btn {
      background-color: #dc3545 !important;
    }

    .reset-btn:hover {
      background-color: #bb2d3b !important;
    }

    /* Animação de digitação */
    .typing-indicator {
      display: inline-flex;
      align-items: center;
      padding: 10px 15px;
      background-color: #007bff;
      border-radius: 18px;
      align-self: flex-start;
      margin-bottom: 10px;
    }

    .typing-dots {
      display: flex;
      margin-left: 5px;
    }

    .typing-dots div {
      width: 8px;
      height: 8px;
      background-color: white;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dots div:nth-child(1) { animation-delay: 0s; }
    .typing-dots div:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-3px); }
    }

    .error-message {
      color: #ff6b6b;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Olá {{ username }}, sou o assistente virtual do SENAI!</h2>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Digite sua pergunta..." autocomplete="off">
      <button onclick="sendMessage()">Enviar</button>
      <button onclick="resetConversation()" class="reset-btn">Reiniciar</button>
    </div>
  </div>

  <script>
    // Ao carregar a página, exibe a mensagem inicial
    window.onload = function() {
      const chatBox = document.getElementById("chat-box");
      addBotMessage("Olá! Sou o assistente virtual do SENAI. Como posso ajudar com cursos, inscrições ou unidades hoje?");
      
      // Focar no input automaticamente
      document.getElementById("user-input").focus();
    }
    
    // Função para adicionar mensagem do bot
    function addBotMessage(message) {
      const chatBox = document.getElementById("chat-box");
      const messageDiv = document.createElement("div");
      messageDiv.className = "message bot-message";
      messageDiv.innerHTML = message;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // Função para adicionar mensagem do usuário
    function addUserMessage(message) {
      const chatBox = document.getElementById("chat-box");
      const messageDiv = document.createElement("div");
      messageDiv.className = "message user-message";
      messageDiv.innerHTML = message;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // Função para mostrar indicador de digitação
    function showTypingIndicator() {
      const chatBox = document.getElementById("chat-box");
      const typingDiv = document.createElement("div");
      typingDiv.className = "typing-indicator";
      typingDiv.id = "typing-indicator";
      typingDiv.innerHTML = `
        <span>Digitando</span>
        <div class="typing-dots">
          <div></div>
          <div></div>
          <div></div>
        </div>
      `;
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // Função para remover indicador de digitação
    function hideTypingIndicator() {
      const indicator = document.getElementById("typing-indicator");
      if (indicator) {
        indicator.remove();
      }
    }
    
    // Permite enviar mensagem com a tecla Enter
    document.getElementById("user-input").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
    
    function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();
      
      if (!message) return;
      
      addUserMessage(message);
      input.value = "";
      
      // Mostrar indicador de "digitando..."
      showTypingIndicator();
      
      // Enviar mensagem para o servidor
      fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("Erro na resposta do servidor");
        }
        return res.json();
      })
      .then(data => {
        hideTypingIndicator();
        
        if (data.error) {
          showErrorMessage(data.error);
        } else {
          addBotMessage(data.reply);
        }
      })
      .catch(error => {
        hideTypingIndicator();
        showErrorMessage("Falha na conexão com o servidor");
        console.error("Erro:", error);
      });
    }
    
    // Função para mostrar mensagem de erro
    function showErrorMessage(message) {
      const chatBox = document.getElementById("chat-box");
      const errorDiv = document.createElement("div");
      errorDiv.className = "error-message";
      errorDiv.innerHTML = `<strong>Erro:</strong> ${message}`;
      chatBox.appendChild(errorDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    function resetConversation() {
      const chatBox = document.getElementById("chat-box");
      chatBox.innerHTML = ""; // Limpa o chat
      
      fetch("/reset", {
        method: "POST"
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("Erro ao reiniciar conversa");
        }
        return res.json();
      })
      .then(() => {
        addBotMessage("Olá! Sou o assistente virtual do SENAI. Como posso ajudar com cursos, inscrições ou unidades hoje?");
      })
      .catch(error => {
        showErrorMessage("Falha ao reiniciar a conversa");
        console.error("Erro:", error);
      });
    }
  </script>
</body>
</html>
